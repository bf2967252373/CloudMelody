name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v4 已经是最新，等待官方支持 Node24

      # ✅ 升级到 v5（支持 Node.js 24，修复弃用警告）
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ 升级到 v4（支持 Node.js 24，修复 Cache 400 错误）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 上传 Debug APK 为 Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: CloudMelody-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
