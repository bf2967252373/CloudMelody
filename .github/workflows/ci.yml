name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          set -eu
          mkdir -p gradle/wrapper
          echo "Downloading gradle-8.6-bin.zip ..."
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle-bin.zip
          echo "Extracting gradle-wrapper.jar ..."
          unzip -o -j /tmp/gradle-bin.zip 'gradle-8.6/lib/plugins/gradle-wrapper-8.6.jar' -d /tmp/
          cp /tmp/gradle-wrapper-8.6.jar gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar size:"
          ls -lh gradle/wrapper/gradle-wrapper.jar
          echo "Verifying classes:"
          unzip -l gradle/wrapper/gradle-wrapper.jar | grep -E 'GradleWrapperMain|IDownload'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
