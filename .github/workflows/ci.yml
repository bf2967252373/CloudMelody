name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          set -e
          mkdir -p gradle/wrapper
          echo "Downloading Gradle 8.6 distribution to extract wrapper jar..."
          curl -fsSL \
            https://services.gradle.org/distributions/gradle-8.6-bin.zip \
            -o /tmp/gradle-8.6-bin.zip
          unzip -o -j /tmp/gradle-8.6-bin.zip \
            'gradle-8.6/lib/plugins/gradle-wrapper-*.jar' \
            -d /tmp/gwjar/ 2>/dev/null || true
          if ls /tmp/gwjar/*.jar 1>/dev/null 2>&1; then
            cp /tmp/gwjar/*.jar gradle/wrapper/gradle-wrapper.jar
          else
            unzip -o -j /tmp/gradle-8.6-bin.zip \
              '*/gradle-wrapper.jar' \
              -d gradle/wrapper/ 2>/dev/null || true
          fi
          ls -lh gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar OK"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-$GITHUB_RUN_NUMBER
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
