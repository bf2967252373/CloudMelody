name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          set -eu
          APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "No APK found!"
            find app/build -type f | head -30
            exit 1
          fi
          TAG=$GITHUB_REF_NAME
          APK_DEST="CloudMelody-$TAG.apk"
          cp "$APK_SRC" "$APK_DEST"
          echo "APK staged: $APK_DEST"
          ls -lh "$APK_DEST"
          echo "RELEASE_APK=$APK_DEST" >> $GITHUB_ENV

      - name: Publish GitHub Release
        run: |
          set -eu
          TAG=$GITHUB_REF_NAME
          APK=$RELEASE_APK
          echo "Publishing release $TAG ..."
          echo "APK: $APK"
          gh release create "$TAG" \
            --title "CloudMelody $TAG" \
            --notes "CloudMelody $TAG - Third-party NetEase Cloud Music Android client. BlueArchive theme, PC login (os=pc), Apple-style lyrics, Android 5.0+." \
            2>/dev/null || echo "Release already exists."
          gh release upload "$TAG" "$APK" --clobber
          echo "Done: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
