name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          set -euo pipefail
          mkdir -p gradle/wrapper
          echo ">>> Downloading gradle-8.6-bin.zip from services.gradle.org ..."
          curl -fsSL \
            https://services.gradle.org/distributions/gradle-8.6-bin.zip \
            -o /tmp/gradle-8.6-bin.zip
          echo ">>> Extracting gradle-wrapper.jar ..."
          unzip -o -j /tmp/gradle-8.6-bin.zip \
            'gradle-8.6/lib/plugins/gradle-wrapper-8.6.jar' \
            -d gradle/wrapper/ 
          mv gradle/wrapper/gradle-wrapper-8.6.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          ls -lh gradle/wrapper/gradle-wrapper.jar
          echo ">>> gradle-wrapper.jar ready"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Find and stage APK
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found in app/build/outputs/apk/release"
            find app/build -type f | head -40
            exit 1
          fi
          echo "Found APK: $APK"
          TAG="$GITHUB_REF_NAME"
          DEST="CloudMelody-${TAG}.apk"
          cp "$APK" "$DEST"
          echo "Staged: $DEST"
          ls -lh "$DEST"
          echo "APK_FILE=$DEST" >> "$GITHUB_ENV"

      - name: Publish to GitHub Release
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          APK="$APK_FILE"
          echo ">>> Creating/updating release for tag: $TAG"
          echo ">>> APK file: $APK"
          # Create release (will fail silently if already exists)
          gh release create "$TAG" \
            --title "CloudMelody $TAG" \
            --notes "$(printf '## CloudMelody %s\n\nNetEase Cloud Music third-party Android client.\n- BlueArchive theme\n- PC login (os=pc)\n- Apple-style lyrics\n- Android 5.0+\n\n**Download the .apk below to install.**' "$TAG")" \
            2>/dev/null || echo "Release already exists, will upload APK directly."
          # Upload APK (overwrite if already uploaded)
          gh release upload "$TAG" "$APK" --clobber
          echo ">>> Release published: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
        env:
          GH_TOKEN: $GITHUB_TOKEN
