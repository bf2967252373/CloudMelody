name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    steps:
      # ✅ 修复1: checkout 升级到 v4（已是最新，保留）
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ 修复2: setup-java 升级到 v4 → v5（支持 Node.js 24）
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ 修复3: setup-gradle 从 v3 升级到 v4（修复 Cache 400 错误，支持 Node.js 24）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ✅ 修复4: 确保 gradlew 有执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          # ✅ 修复5: 如果你的 build.gradle 里有签名配置，需要在 repo Settings → Secrets 里添加这些变量
          # KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          # KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          # KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # 获取版本号（从 tag 或 version.properties）
      - name: Get version name
        id: get_version
        run: |
          if [ -f "version.properties" ]; then
            VERSION=$(grep "versionName" version.properties | cut -d'=' -f2 | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # 上传 APK 为 Artifact（方便调试）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMelody-release-${{ steps.get_version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # 发布到 GitHub Releases
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CloudMelody ${{ steps.get_version.outputs.version }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
