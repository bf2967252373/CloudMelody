name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          set -e
          mkdir -p gradle/wrapper
          echo "Downloading Gradle 8.6 distribution to extract wrapper jar..."
          curl -fsSL \
            https://services.gradle.org/distributions/gradle-8.6-bin.zip \
            -o /tmp/gradle-8.6-bin.zip
          unzip -o -j /tmp/gradle-8.6-bin.zip \
            'gradle-8.6/lib/plugins/gradle-wrapper-*.jar' \
            -d /tmp/gwjar/ 2>/dev/null || true
          # Try multiple paths inside the zip
          if ls /tmp/gwjar/*.jar 1>/dev/null 2>&1; then
            cp /tmp/gwjar/*.jar gradle/wrapper/gradle-wrapper.jar
          else
            unzip -o -j /tmp/gradle-8.6-bin.zip \
              '*/gradle-wrapper.jar' \
              -d gradle/wrapper/ 2>/dev/null || true
          fi
          ls -lh gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar OK"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --info

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find app/build/outputs -type f | head -30
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          TAG_NAME="$GITHUB_REF_NAME"
          DEST="CloudMelody-${TAG_NAME}.apk"
          cp "$APK_PATH" "$DEST"
          echo "apk_dest=$DEST" >> "$GITHUB_OUTPUT"
          ls -lh "$DEST"

      - name: Create or update GitHub Release
        run: |
          TAG_NAME="$GITHUB_REF_NAME"
          APK_FILE="$(cat "$GITHUB_OUTPUT" | grep apk_dest | cut -d= -f2)"
          echo "Publishing release $TAG_NAME with APK: $APK_FILE"
          # Create the release (ignore if exists) then upload APK
          gh release create "$TAG_NAME" \
            --title "CloudMelody $TAG_NAME" \
            --notes "CloudMelody $TAG_NAME release - NetEase Cloud Music Android client" \
            2>/dev/null || true
          gh release upload "$TAG_NAME" "$APK_FILE" --clobber
          echo "Upload complete!"
        env:
          GH_TOKEN: $GITHUB_TOKEN
