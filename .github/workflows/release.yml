name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate and rename APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          DEST="CloudMelody-${{ steps.version.outputs.VERSION }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT
          ls -lh "$DEST"

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT="${GITHUB_REF#refs/tags/}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1)
          if [ -n "$PREV" ]; then
            NOTES=$(git log --pretty=format:'- %s' "${PREV}..${CURRENT}" 2>/dev/null || echo '- Improvements')
          else
            NOTES=$(git log --pretty=format:'- %s' | head -20)
          fi
          {
            echo 'NOTES<<ENDOFNOTES'
            printf '%s\n' "$NOTES"
            echo 'ENDOFNOTES'
          } >> $GITHUB_OUTPUT

      - name: Publish Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CloudMelody ${{ github.ref_name }} 🎵"
          body: |
            ## 🎵 CloudMelody ${{ github.ref_name }}

            > 轻量第三方网易云音乐安卓客户端 · BlueArchive 主题 · Apple 歌词 · os=pc 登录

            ### 📦 安装
            下载下方 `.apk` 并安装到 Android 5.0+ 设备。

            ### 🆕 更新
            ${{ steps.changelog.outputs.NOTES }}

            ### ⚠️ 说明
            - 需自行配置 `PROXY_BASE`（见 QUICKSTART.md）
            - 仅供学习交流，请支持正版音乐
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
