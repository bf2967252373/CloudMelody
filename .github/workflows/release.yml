name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          set -eu
          mkdir -p gradle/wrapper
          echo "Downloading gradle-8.6-bin.zip ..."
          curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle-bin.zip
          echo "Extracting gradle-wrapper.jar ..."
          unzip -o -j /tmp/gradle-bin.zip 'gradle-8.6/lib/plugins/gradle-wrapper-8.6.jar' -d /tmp/
          cp /tmp/gradle-wrapper-8.6.jar gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar size:"
          ls -lh gradle/wrapper/gradle-wrapper.jar
          echo "Verifying classes:"
          unzip -l gradle/wrapper/gradle-wrapper.jar | grep -E 'GradleWrapperMain|IDownload'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          set -eu
          APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "No APK found!"
            find app/build -type f | head -30
            exit 1
          fi
          TAG=$GITHUB_REF_NAME
          APK_DEST="CloudMelody-$TAG.apk"
          cp "$APK_SRC" "$APK_DEST"
          echo "APK staged: $APK_DEST"
          ls -lh "$APK_DEST"
          echo "RELEASE_APK=$APK_DEST" >> $GITHUB_ENV

      - name: Publish GitHub Release
        run: |
          set -eu
          TAG=$GITHUB_REF_NAME
          APK=$RELEASE_APK
          echo "Publishing release $TAG ..."
          echo "APK: $APK"
          gh release upload "$TAG" "$APK" --clobber
          echo "Done: https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
