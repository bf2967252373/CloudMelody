name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          # Decode from base64 embedded in workflow
          base64 -d <<'WRAPPEREOF' > gradle/wrapper/gradle-wrapper.jar
          UEsDBBQAAAgIAAAAQQAAAAAAAgAAAAAAAAAJAAAATUVUQS1JTkYvAwBQSwMEFAAACAgAAABBAFwnZj8/
          AAAAVAAAABQAAABNRVRBLUlORi9NQU5JRkVTVC5NRvNNzMtMSy0u0Q1LLSrOzM+zUjDUM+Dl8swt
          yEnNTc0rSSwBCuqGZJbkpFopuBclpuSkYsjCtVromfFy8XIBAFBLAwQUAAAICAAAAEEAAAAAAAIA
          AAAAAAAABAAAAm9yZy8DAFBLAwQUAAAICAAAAEEAAAAAAAIAAAAAAAAACwAAAG9yZy9ncmFkbGUv
          AwBQSwMEFAAACAgAAABBAAAAAAACAAAAAAAAABMAAABvcmcvZ3JhZGxlL3dyYXBwZXIvAwBQSwME
          FAAACAgAAABBAIbo13cnCgAAXhcAACoAAABvcmcvZ3JhZGxlL3dyYXBwZXIvR3JhZGxlV3JhcHBl
          ck1haW4uY2xhc3MAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          WRAPPEREOF
          # Verify or fallback download
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Falling back to downloading gradle-wrapper.jar..."
            curl -fsSL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle.zip
            unzip -j /tmp/gradle.zip '*/gradle-wrapper.jar' -d gradle/wrapper/ 2>/dev/null || true
          fi
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2g

      - name: Locate and rename APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Found APK: $APK"
          TAG=${GITHUB_REF_NAME}
          DEST="CloudMelody-${TAG}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          ls -lh "$DEST"

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT=${GITHUB_REF_NAME}
          PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1)
          if [ -n "$PREV" ]; then
            NOTES=$(git log --pretty=format:'- %s' "${PREV}..${CURRENT}" 2>/dev/null || echo '- Improvements and bug fixes')
          else
            NOTES=$(git log --pretty=format:'- %s' | head -20)
          fi
          {
            echo 'NOTES<<ENDOFNOTES'
            printf '%s\n' "$NOTES"
            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Publish Release
        run: |
          TAG=${GITHUB_REF_NAME}
          APK_PATH="${{ steps.apk.outputs.path }}"
          NOTES="${{ steps.changelog.outputs.NOTES }}"
          BODY="## 🎵 CloudMelody ${TAG}\n\n> 轻量第三方网易云音乐安卓客户端 · BlueArchive 主题 · Apple 歌词 · os=pc 登录\n\n### 📦 安装\n下载下方 \`.apk\` 并安装到 Android 5.0+ 设备。\n\n### 🆕 更新\n${NOTES}\n\n### ⚠️ 说明\n- 需自行配置 PROXY_BASE（见 QUICKSTART.md）\n- 仅供学习交流，请支持正版音乐"
          gh release create "${TAG}" \
            --title "CloudMelody ${TAG} 🎵" \
            --notes "${BODY}" \
            "${APK_PATH}" || \
          gh release upload "${TAG}" "${APK_PATH}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
